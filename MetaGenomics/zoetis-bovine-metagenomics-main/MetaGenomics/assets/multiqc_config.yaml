report_comment: >
    This report has been generated by the <a href="https://lizard.bio" target="_blank">BioLizard Metagenomics</a>
    analysis pipeline.

extra_fn_clean_trim:
  - "cleaned_"
  - "raw_"
  - '_kept_contigs'
  - '.count_reads_on_contigs'
  - '.no_filter'
  - '.host_filter'
  - '_scaffolds'
  - '.txt'
  - '.contigs'
  - '.sort'
  - '_kaiju_MEM_verbose'
  - '_sickle'
  - '_cutadapt'
  
extra_fn_clean_exts:
  - "_select_contigs_cpm"

use_filename_as_sample_name:
  - cutadapt

module_order:
    - fastqc:
        name: 'FastQC (raw)'
        path_filters:
            - './fastqc_raw_report/*.zip'
    - cutadapt:
        path_filters:
          - './cutadapt_report/*'
    - sickle:
        path_filters:
            - 'sickle_report/*_sickle.log'
    - samtools:
        name : 'Reads mapping the host genome'
        info: 'This section reports of the reads alignement against host genome.'
        path_filters:
            - './reads_on_host_genome/*.flagstat'
    - fastqc:
        name: 'FastQC (cleaned)'
        info: 'This section of the report shows FastQC results after adapter trimming and cleaning.'
        path_filters:
            - './fastqc_clean_report/*cleaned_*.zip'
    - kaiju:
        path_filters:
        - './kaiju_report/*'
    - samtools:
        name : 'Reads alignment on unfiltered assembly'
        info: 'This section reports reads alignement on contigs.'
        path_filters:
            - './unfiltered_assembly_flagstat/*.flagstat'
    - samtools:
        name : 'Reads alignment on final assembly'
        info: 'This section reports reads alignement on contigs.'
        path_filters:
            - './final_assembly_flagstat/*'

report_section_order:
  stats_table:
    order: -1020
  software_versions:
    order: -1050


# disaply nicely bin table even when there are a lot of bins.
max_table_rows: 1000



table_columns_visible:
  FastQC (raw):
        percent_duplicates: False
        percent_gc: False
  Structural annotation:
        organism: False
  Reads alignment on unfiltered assembly:
        mapped_passed_pct: True
  Reads alignment on final assembly:
        mapped_passed_pct: True

